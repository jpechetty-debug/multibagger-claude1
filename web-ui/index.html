<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sovereign Research Terminal</title>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Geist+Mono:wght@300;400;500;600&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg0:#04060d;--bg1:#080c17;--bg2:#0c1120;--bg3:#111928;--bg4:#161f30;
  --wire:rgba(255,255,255,0.055);--wire2:rgba(255,255,255,0.10);--wire3:rgba(255,255,255,0.18);
  --t0:#ffffff;--t1:#c9d4f0;--t2:#6d7fa8;--t3:#3a445e;
  --acid:#00ffa3;--acid-d:rgba(0,255,163,0.10);--acid-g:0 0 20px rgba(0,255,163,0.22);
  --rose:#ff3060;--rose-d:rgba(255,48,96,0.10);
  --gold:#ffb700;--gold-d:rgba(255,183,0,0.10);
  --sky:#3d9eff;--sky-d:rgba(61,158,255,0.10);
  --mono:'Geist Mono',monospace;--sans:'Geist',sans-serif;--display:'Syne',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg0);color:var(--t1);font-family:var(--sans);font-size:13px}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 1px,rgba(255,255,255,.010) 1px,rgba(255,255,255,.010) 2px);
  background-size:100% 2px;opacity:.6}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 30% at 5% 0%,rgba(0,255,163,.03) 0%,transparent 70%),
             radial-gradient(ellipse 40% 40% at 95% 5%,rgba(61,158,255,.04) 0%,transparent 70%)}

/* LAYOUT */
#root{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh}

/* NAV */
.nav{display:flex;align-items:center;padding:0 32px;height:50px;
  background:rgba(4,6,13,.94);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--wire);flex-shrink:0}
.nav-brand{display:flex;align-items:center;gap:10px;padding-right:16px;margin-right:4px;border-right:1px solid var(--wire);flex-shrink:0}
.nav-sigma{width:28px;height:28px;border-radius:7px;
  background:conic-gradient(from 135deg,var(--acid),var(--sky),var(--acid));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-weight:800;font-size:13px;color:var(--bg0)}
.nav-wordmark{font-family:var(--display);font-size:14px;font-weight:800;letter-spacing:2px;color:var(--t0)}
.nav-sub{font-family:var(--mono);font-size:8px;color:var(--t3);letter-spacing:1px;text-transform:uppercase}
.nav-tabs{display:flex;gap:1px;flex:1;padding:0 12px;overflow:hidden}
.nav-tab{padding:0 12px;height:50px;display:flex;align-items:center;font-family:var(--mono);font-size:10px;font-weight:500;
  color:var(--t3);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none}
.nav-tab:hover{color:var(--t1);border-bottom-color:var(--wire2)}
.nav-tab.active{color:var(--acid);border-bottom-color:var(--acid)}
.nav-right{display:flex;align-items:center;gap:10px;padding-left:14px;border-left:1px solid var(--wire);flex-shrink:0}
.vix-pill{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;background:var(--bg2);border:1px solid var(--wire);font-family:var(--mono);font-size:10px}
.vix-dot{width:5px;height:5px;border-radius:50%}
.vix-dot.safe{background:var(--acid);box-shadow:0 0 6px var(--acid)}
.vix-dot.warn{background:var(--gold);box-shadow:0 0 6px var(--gold)}
.vix-dot.risk{background:var(--rose);box-shadow:0 0 6px var(--rose)}
.regime-chip{font-family:var(--mono);font-size:9px;font-weight:600;padding:3px 9px;border-radius:4px}
.regime-BULL{background:var(--acid-d);color:var(--acid)}
.regime-BEAR{background:var(--rose-d);color:var(--rose)}
.regime-SIDEWAYS,.regime-NEUTRAL{background:var(--gold-d);color:var(--gold)}
.regime-VOLATILE{background:var(--rose-d);color:var(--rose)}

/* TICKER TAPE */
.tape{height:28px;background:var(--bg1);border-bottom:1px solid var(--wire);display:flex;align-items:center;overflow:hidden;flex-shrink:0}
.tape-inner{display:flex;animation:tape 60s linear infinite;white-space:nowrap}
.tape-item{display:flex;align-items:center;gap:7px;padding:0 18px;border-right:1px solid var(--wire);font-family:var(--mono);font-size:9.5px}
.t-sym{color:var(--t0);font-weight:600}.t-px{color:var(--t2)}.t-up{color:var(--acid)}.t-dn{color:var(--rose)}
@keyframes tape{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.3)}}
@keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes flashGreen { 0% { background-color: rgba(16, 185, 129, 0); } 50% { background-color: rgba(16, 185, 129, 0.1); } 100% { background-color: rgba(16, 185, 129, 0); } }
@keyframes flashRed { 0% { background-color: rgba(239, 68, 68, 0); } 50% { background-color: rgba(239, 68, 68, 0.1); } 100% { background-color: rgba(239, 68, 68, 0); } }
@keyframes heartPulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: 0.5; } }

.glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
.heart-pulse { animation: heartPulse 2s infinite ease-in-out; }
.animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }

/* MAIN BODY */
.body{display:flex;flex:1;overflow:hidden}
.sidebar{width:220px;border-right:1px solid var(--wire);background:var(--bg1);flex-shrink:0;display:flex;flex-direction:column;overflow:hidden}
.sb-section{padding:12px;border-bottom:1px solid var(--wire)}
.sb-label{font-family:var(--mono);font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--t3);display:flex;align-items:center;gap:6px;margin-bottom:8px}
.sb-label::before{content:'';width:8px;height:1px;background:var(--acid)}
.sb-stat{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.sb-stat:last-child{border-bottom:none}
.sb-key{font-family:var(--mono);font-size:9px;color:var(--t3)}
.sb-val{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--t1)}
.sb-val.up{color:var(--acid)}.sb-val.dn{color:var(--rose)}.sb-val.warn{color:var(--gold)}
.filter-row{display:flex;flex-direction:column;gap:3px}
.filter-btn{padding:6px 10px;border-radius:6px;border:1px solid var(--wire);background:transparent;color:var(--t2);
  font-family:var(--mono);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .12s;text-align:left}
.filter-btn:hover{background:var(--bg2);color:var(--t1);border-color:var(--wire2)}
.filter-btn.active{background:var(--acid-d);color:var(--acid);border-color:rgba(0,255,163,.25)}

/* MAIN PANEL */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.toolbar{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--wire);background:var(--bg1);flex-shrink:0}
.search{flex:1;position:relative}
.search input{width:100%;background:var(--bg2);border:1px solid var(--wire);color:var(--t0);border-radius:8px;
  font-family:var(--mono);font-size:11px;padding:7px 12px 7px 32px;outline:none;transition:all .2s}
.search input::placeholder{color:var(--t3);font-size:10px}
.search input:focus{border-color:var(--acid);box-shadow:0 0 0 3px var(--acid-d)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3)}
.scan-btn{padding:7px 16px;border-radius:20px;background:linear-gradient(135deg,var(--acid) 0%,#00cc85 100%);
  color:var(--bg0);font-family:var(--mono);font-size:10px;font-weight:700;border:none;cursor:pointer;transition:all .2s}
.scan-btn:hover{box-shadow:var(--acid-g);transform:translateY(-1px)}
.scan-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* SIGNAL TABLE */
.table-wrap{flex:1;overflow-y:auto}
.table-wrap::-webkit-scrollbar{width:4px}
.table-wrap::-webkit-scrollbar-track{background:transparent}
.table-wrap::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.thead{display:grid;grid-template-columns:28px 1.6fr .9fr 60px .8fr 1fr 80px;
  padding:7px 16px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--wire);
  font-family:var(--mono);font-size:8px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;position:sticky;top:0;z-index:10}
.trow{display:grid;grid-template-columns:28px 1.6fr .9fr 60px .8fr 1fr 80px;
  padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.022);align-items:center;
  cursor:pointer;transition:background .1s;animation:rise .3s ease both}
.trow:hover{background:rgba(255,255,255,.018)}
.trow.sel{background:rgba(0,255,163,.05)}
.r{text-align:right}.c{text-align:center}
.rank-n{font-family:var(--mono);font-size:9px;color:var(--t3)}
.sym-lg{font-family:var(--display);font-size:13px;font-weight:700;color:var(--t0);display:block;letter-spacing:.2px}
.co-sm{font-family:var(--mono);font-size:8px;color:var(--t3);margin-top:1px;display:block}
.px-cell{font-family:var(--mono);font-size:11px;color:var(--t1);text-align:right}
.chg-up{font-family:var(--mono);font-size:10px;color:var(--acid);text-align:right}
.chg-dn{font-family:var(--mono);font-size:10px;color:var(--rose);text-align:right}
.sc-wrap{display:flex;align-items:center;gap:6px;justify-content:flex-end}
.sc-bar{width:38px;height:2px;background:var(--bg0);border-radius:1px;overflow:hidden}
.sc-fill{height:100%;border-radius:1px}
.sc-num{font-family:var(--mono);font-size:10px;font-weight:600;min-width:20px;text-align:right}
.badge{font-family:var(--mono);font-size:8px;font-weight:700;padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.3px}
.badge-BUY{background:var(--acid-d);color:var(--acid);border:1px solid rgba(0,255,163,.18)}
.badge-WATCH{background:var(--sky-d);color:var(--sky);border:1px solid rgba(61,158,255,.18)}
.badge-REJECT,.badge-DISQUALIFIED{background:var(--bg3);color:var(--t3);border:1px solid var(--wire)}
.sect-cell{font-family:var(--mono);font-size:9px;color:var(--t2);text-align:right}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:8px}
.empty-icon{font-size:32px;opacity:.3}
.empty-txt{font-family:var(--mono);font-size:11px;color:var(--t3)}

/* DETAIL DRAWER */
.drawer{width:380px;border-left:1px solid var(--wire);background:var(--bg1);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:width .2s}
.drawer.closed{width:0;border-left:none}
.drawer-hdr{padding:14px 16px;border-bottom:1px solid var(--wire);flex-shrink:0}
.drawer-sym{font-family:var(--display);font-size:22px;font-weight:800;color:var(--t0);letter-spacing:.3px}
.drawer-name{font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:2px}
.drawer-price{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--t0);margin-top:8px}
.drawer-chg{font-family:var(--mono);font-size:11px;margin-left:8px}
.drawer-body{flex:1;overflow-y:auto;padding:12px 16px}
.drawer-body::-webkit-scrollbar{width:3px}
.drawer-body::-webkit-scrollbar-thumb{background:var(--bg4)}
.panel-card{background:var(--bg2);border:1px solid var(--wire);border-radius:10px;overflow:hidden;margin-bottom:10px}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid var(--wire)}
.panel-title{font-family:var(--mono);font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--t2);display:flex;align-items:center;gap:6px}
.panel-title::before{content:'';width:8px;height:1px;background:var(--acid)}
.factor-row{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid rgba(255,255,255,.03)}
.factor-row:last-child{border-bottom:none}
.factor-label{font-family:var(--mono);font-size:9px;color:var(--t2);width:90px;flex-shrink:0}
.factor-bar-wrap{flex:1;height:3px;background:var(--bg0);border-radius:1px;overflow:hidden}
.factor-bar{height:100%;border-radius:1px;background:var(--acid)}
.factor-val{font-family:var(--mono);font-size:9px;font-weight:600;color:var(--t1);width:28px;text-align:right}
.kv-row{display:flex;justify-content:space-between;padding:5px 12px;border-bottom:1px solid rgba(255,255,255,.03);font-family:var(--mono);font-size:9px}
.kv-row:last-child{border-bottom:none}
.kv-key{color:var(--t3)}.kv-val{color:var(--t1);font-weight:500}
.kv-val.up{color:var(--acid)}.kv-val.dn{color:var(--rose)}
.regime-bar-wrap{padding:10px 12px}
.regime-state{font-family:var(--display);font-size:20px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.regime-desc{font-family:var(--mono);font-size:9px;color:var(--t3)}
.close-btn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:0 4px;line-height:1;transition:color .12s}
.close-btn:hover{color:var(--t1)}
.loading-dot{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--acid);animation:pulse 1.4s ease-in-out infinite}
.loading-dot:nth-child(2){animation-delay:.2s}.loading-dot:nth-child(3){animation-delay:.4s}
.conn-status{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:9px;color:var(--t3)}
.conn-dot{width:5px;height:5px;border-radius:50%}
.conn-dot.live{background:var(--acid);animation:pulse 2s infinite}
.conn-dot.dead{background:var(--rose)}
</style>

<body>
<div id="root"></div>

<script type="text/babel">
const {useState, useEffect, useCallback, useRef, useMemo} = React;
const {BarChart,Bar,RadarChart,Radar,PolarGrid,PolarAngleAxis,
       LineChart,Line,XAxis,YAxis,Tooltip,ResponsiveContainer,ComposedChart,CartesianGrid,Legend,Area,AreaChart} = Recharts;

const API = '';

const IntegrityWidget = React.memo(({ latency, queue }) => (
    <div className="glass rounded-xl p-3 flex flex-col justify-between h-20 border border-white/5 bg-gradient-to-br from-slate-900 to-slate-800 mb-2">
        <div>
            <div className="text-[8px] text-slate-500 font-bold uppercase tracking-[0.2em] mb-1">Neural Heartbeat</div>
            <div className="flex items-baseline gap-1">
                <span className={`text-lg font-black font-mono ${latency < 20 ? 'text-emerald-400' : 'text-amber-400'}`}>{latency}</span>
                <span className="text-[8px] text-slate-500 font-bold">ms</span>
            </div>
        </div>
        <div>
            <div className="w-full bg-slate-800 h-1 rounded-full overflow-hidden mb-1">
                <div className="h-full bg-emerald-500 animate-pulse" style={{ width: '100%' }}></div>
            </div>
            <div className="flex justify-between items-center">
                <span className="text-[7px] text-slate-500 font-bold uppercase tracking-wider">Queue Depth</span>
                <span className="text-[8px] text-white font-mono font-bold">{queue}</span>
            </div>
        </div>
    </div>
));

const StressDashboard = ({ engine }) => {
    const [metrics, setMetrics] = useState(engine?.metrics || {fps:60, eventsPerSec:0, avgLag:12, p99Lag:22, heapUsed:45});
    if (!engine?.active) return null;
    return (
        <div className="fixed top-20 left-4 z-50 bg-black/90 border border-red-500/50 p-4 rounded-xl shadow-2xl backdrop-blur-md w-64 font-mono text-xs animate-fade-in text-white">
            <div className="text-red-500 font-bold uppercase tracking-widest mb-2 border-b border-red-500/30 pb-1">
                Stress Harness: {engine.currentLevel.toUpperCase()}
            </div>
            <div className="grid grid-cols-2 gap-y-2 gap-x-4">
                <div className="text-slate-400">FPS</div>
                <div className={`text-right font-bold ${metrics.fps < 40 ? 'text-red-500 animate-pulse' : 'text-emerald-400'}`}>{metrics.fps}</div>
                <div className="text-slate-400">Events/s</div>
                <div className="text-right text-white font-bold">{metrics.eventsPerSec}</div>
                <div className="text-slate-400">Avg Lag</div>
                <div className={`text-right font-bold ${metrics.avgLag > 30 ? 'text-orange-400' : 'text-emerald-400'}`}>{metrics.avgLag}ms</div>
                <div className="text-slate-400">P99 Lag</div>
                <div className={`text-right font-bold ${metrics.p99Lag > 100 ? 'text-red-500' : 'text-blue-400'}`}>{metrics.p99Lag}ms</div>
                <div className="text-slate-400">Heap</div>
                <div className="text-right text-purple-400">{metrics.heapUsed} MB</div>
            </div>
            <div className="mt-3 pt-2 border-t border-white/10 flex justify-between items-center">
                <span className="text-slate-500">Status</span>
                <span className="bg-red-500/20 text-red-300 px-2 py-0.5 rounded text-[9px] uppercase font-bold animate-pulse">ACTIVE</span>
            </div>
        </div>
    );
};

const QuarterlyTimeline = ({ symbol }) => {
    const [data, setData]         = useState(null);
    const [loading, setLoading]   = useState(true);
    const [error, setError]       = useState(null);
    const [viewMode, setViewMode] = useState('revenue');

    useEffect(() => {
        if (!symbol) return;
        setLoading(true); setError(null);
        fetch(`/api/quarterly-results/${symbol}`)
            .then(r => { if (!r.ok) throw new Error('Failed to load quarterly results'); return r.json(); })
            .then(d => { setData(d); setLoading(false); })
            .catch(e => { setError(e.message); setLoading(false); });
    }, [symbol]);

    if (loading) return <div className="text-center py-10"><div className="loading-dot"/><div className="loading-dot"/><div className="loading-dot"/></div>;
    if (error) return <div className="text-red-400 text-[10px] p-4 bg-red-400/10 rounded">Error: {error}</div>;
    if (!data || !data.timeline) return <div className="text-slate-500 text-[10px] p-4 italic">No quarterly data available.</div>;

    return (
        <div className="animate-fade-in">
            <div className="flex justify-between items-center mb-4">
                <div className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Financial Pulse</div>
                <div className="flex gap-1">
                    <button onClick={() => setViewMode('revenue')} className={`px-2 py-0.5 rounded text-[8px] font-bold uppercase transition-all ${viewMode === 'revenue' ? 'bg-emerald-500 text-black' : 'bg-slate-800 text-slate-400'}`}>Revenue</button>
                    <button onClick={() => setViewMode('profit')} className={`px-2 py-0.5 rounded text-[8px] font-bold uppercase transition-all ${viewMode === 'profit' ? 'bg-emerald-500 text-black' : 'bg-slate-800 text-slate-400'}`}>Profit</button>
                </div>
            </div>
            <div className="h-48 w-full bg-slate-900/40 rounded-xl p-2 border border-white/5">
                <ResponsiveContainer width="100%" height="100%">
                    <ComposedChart data={data.timeline}>
                        <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)" vertical={false} />
                        <XAxis dataKey="date" tick={{ fill: '#64748b', fontSize: 8 }} axisLine={false} tickLine={false} />
                        <YAxis hide domain={['auto', 'auto']} />
                        <Tooltip contentStyle={{ backgroundColor: '#0f172a', borderColor: '#334155', borderRadius: '8px', fontSize: '10px' }} />
                        <Bar dataKey={viewMode} fill={viewMode === 'revenue' ? '#3b82f6' : '#10b981'} radius={[4, 4, 0, 0]} barSize={20} />
                        <Line type="monotone" dataKey={viewMode} stroke="#ffffff" strokeWidth={2} dot={{ r: 3, fill: '#ffffff' }} />
                    </ComposedChart>
                </ResponsiveContainer>
            </div>
        </div>
    );
};

function fetchJSON(url, signal) {
  return fetch(API + url, signal ? {signal} : {}).then(r => {
    if (!r.ok) throw new Error(`${r.status}`);
    return r.json();
  });
}

const FILTERS = ['ALL','BUY','WATCH','MULTIBAGGER'];
const REGIME_COLORS = {BULL:'var(--acid)',BEAR:'var(--rose)',SIDEWAYS:'var(--gold)',NEUTRAL:'var(--gold)',VOLATILE:'var(--rose)'};
const SCORE_COLOR = s => s >= 75 ? 'var(--acid)' : s >= 55 ? 'var(--gold)' : 'var(--rose)';

function NavBar({regime, vix, liveCount, connected, activeTab, onTabChange}) {
  const vixClass = !vix ? 'warn' : vix >= 25 ? 'risk' : vix >= 18 ? 'warn' : 'safe';
  const tabs = ['Signals','Portfolio', 'Allocation', 'Backtest', 'Regime', 'Alerts'];
  return (

function App() {
  const [stocks, setStocks] = useState([]);
  const [regime, setRegime] = useState(null);
  const [slippage, setSlippage] = useState(null);
  const [activeTab, setActiveTab] = useState('Signals');
  const [filter, setFilter] = useState('ALL');
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(null);
  const [loading, setLoading] = useState(false);
  const [connected, setConnected] = useState(false);
  const [scanning, setScanning] = useState(false);
  const [metrics, setMetrics] = useState({latency:14, queue:0, fps:60, eventsPerSec:124, avgLag:12, p99Lag:22, heapUsed:45});
  const [stressActive, setStressActive] = useState(false);
  const wsRef = useRef(null);

  useEffect(() => {
    const i = setInterval(() => {
      setMetrics(prev => ({
        ...prev,
        latency: 12 + Math.floor(Math.random() * 8),
        fps: 58 + Math.floor(Math.random() * 5),
        eventsPerSec: 100 + Math.floor(Math.random() * 50)
      }));
    }, 2000);
    return () => clearInterval(i);
  }, []);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const endpoint = filter === 'MULTIBAGGER' ? '/api/multibagger-hunt' : '/api/stocks';
      const data = await fetchJSON(endpoint);
      setStocks(Array.isArray(data) ? data : []);
      setConnected(true);
    } catch { setConnected(false); }
    finally { setLoading(false); }
  }, [filter]);

  const loadRegime = useCallback(async () => {
    try { const d = await fetchJSON('/api/regime_status'); setRegime(d); } catch {}
  }, []);

  const loadSlippage = useCallback(async () => {
    try { 
      const d = await fetchJSON('/api/slippage_stats'); 
      setSlippage(Array.isArray(d) ? d[0] : d); 
    } catch {}
  }, []);

  useEffect(() => {
    load();
    loadRegime();
    loadSlippage();
    const intervals = [
      setInterval(loadRegime, 60000),
      setInterval(loadSlippage, 30000),
      setInterval(load, 120000),
    ];
    return () => intervals.forEach(clearInterval);
  }, [load]);

  // WebSocket for live updates
  useEffect(() => {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    try {
      const ws = new WebSocket(`${proto}://${location.host}/ws/signals`);
      ws.onopen = () => setConnected(true);
      ws.onmessage = e => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'update' && msg.data) {
            setStocks(prev => {
              const map = new Map(prev.map(s => [s.Symbol || s.symbol, s]));
              (Array.isArray(msg.data) ? msg.data : [msg.data]).forEach(s => {
                map.set(s.Symbol || s.symbol, s);
              });
              return Array.from(map.values());
            });
          }
        } catch {}
      };
      ws.onclose = () => setConnected(false);
      ws.onerror = () => setConnected(false);
      wsRef.current = ws;
    } catch {}
    return () => wsRef.current?.close();
  }, []);

  const runScan = async () => {
    setScanning(true);
    try {
      await fetch('/api/scan', {method:'POST'});
      setTimeout(load, 3000);
    } catch {}
    finally { setScanning(false); }
  };

  const filtered = useMemo(() => {
    let s = stocks;
    if (filter === 'BUY') s = s.filter(x => (x.Action||x.action) === 'BUY');
    else if (filter === 'WATCH') s = s.filter(x => (x.Action||x.action) === 'WATCH');
    if (search) {
      const q = search.toLowerCase();
      s = s.filter(x => (x.Symbol||x.symbol||'').toLowerCase().includes(q) || (x.Name||x.name||'').toLowerCase().includes(q));
    }
    return s.sort((a,b) => (b.Score||b.score||0) - (a.Score||a.score||0));
  }, [stocks, filter, search]);

  const vix = regime?.vix;
  const regimeName = regime?.regime;

  return (
    <>
      <div onClick={() => setStressActive(!stressActive)} style={{position:'fixed', bottom:10, left:10, zIndex:100, cursor:'pointer', opacity:0.3}}>⚡</div>
      <StressDashboard engine={{active: stressActive, currentLevel: 'High Performance', metrics}} />
      <NavBar regime={regimeName} vix={vix} liveCount={filtered.length} connected={connected} activeTab={activeTab} onTabChange={setActiveTab}/>
      <TickerTape stocks={stocks}/>
      <div className="body">
        <Sidebar filter={filter} onFilter={f=>{setFilter(f);setSelected(null)}} regimeData={regime} slippageData={slippage} metrics={metrics}/>
        <div className="main">
          {activeTab === 'Signals' && (
            <>
              <div className="toolbar">
                <div className="search">
                  <svg className="search-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                  <input placeholder="Search symbol or company…" value={search} onChange={e=>setSearch(e.target.value)}/>
                </div>
                <button className="scan-btn" onClick={runScan} disabled={scanning}>
                  {scanning ? '⟳ Scanning…' : '⚡ Run Scan'}
                </button>
              </div>
              <div className="table-wrap">
                <div className="thead">
                  <div>#</div>
                  <div>Stock</div>
                  <div className="r">Sector</div>
                  <div>Action</div>
                  <div className="r">Price</div>
                  <div className="r">Chg%</div>
                  <div className="r">Score</div>
                </div>
                {loading ? (
                  <div className="empty">
                    <div style={{display:'flex',gap:5}}>
                      <div className="loading-dot"/><div className="loading-dot"/><div className="loading-dot"/>
                    </div>
                    <div className="empty-txt">Loading signals…</div>
                  </div>
                ) : filtered.length === 0 ? (
                  <div className="empty">
                    <div className="empty-icon">◈</div>
                    <div className="empty-txt">{search ? 'No matches' : 'No signals yet — run a scan'}</div>
                  </div>
                ) : filtered.map((s, i) => {
                  const sym = s.Symbol || s.symbol;
                  return (
                    <SignalRow key={sym||i} stock={s} idx={i}
                      selected={(selected?.Symbol || selected?.symbol) === sym}
                      onClick={()=>setSelected((selected?.Symbol || selected?.symbol) === sym ? null : s)}/>
                  );
                })}
              </div>
            </>
          )}

          {activeTab === 'Portfolio' && <PortfolioView/>}
          {activeTab === 'Allocation' && <AllocationView/>}
          {activeTab === 'Backtest' && <BacktestView/>}
          {activeTab === 'Regime' && <RegimeView data={regime}/>}
          {activeTab === 'Alerts' && <AlertsView/>}
        </div>
        <Drawer stock={selected} onClose={()=>setSelected(null)}/>
      </div>
    </>
  );
}

function PortfolioView() {
  const [trades, setTrades] = useState([]);
  const [perf, setPerf] = useState(null);
  useEffect(() => {
    fetchJSON('/api/trades/open').then(setTrades);
    fetchJSON('/api/performance').then(setPerf);
  }, []);
  return (
    <div className="table-wrap" style={{padding:20}}>
      <div className="sb-label" style={{marginBottom:20}}>Live Portfolio</div>
      <div className="thead" style={{marginBottom:10}}>
        <div>Stock</div>
        <div className="r">Entry Price</div>
        <div className="r">Current Price</div>
        <div className="r">Qty</div>
        <div className="r">P/L %</div>
      </div>
      {trades.map(t => {
        const pl = ((t.current_price - t.entry_price) / t.entry_price) * 100;
        return (
          <div key={t.symbol} className="trow" style={{borderBottom:'1px solid var(--wire)'}}>
            <div className="sym-lg">{t.symbol}</div>
            <div className="px-cell">₹{t.entry_price.toLocaleString()}</div>
            <div className="px-cell">₹{t.current_price.toLocaleString()}</div>
            <div className="px-cell">{t.quantity}</div>
            <div className={pl >= 0 ? 'chg-up r' : 'chg-dn r'}>{pl >= 0 ? '+' : ''}{pl.toFixed(2)}%</div>
          </div>
        );
      })}
      {perf && (
        <div style={{marginTop:30, display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:20}}>
          <div className="panel-card"><div className="panel-hdr"><span className="panel-title">Alpha</span></div><div className="regime-state" style={{padding:15, color:'var(--acid)'}}>+{perf.alpha}%</div></div>
          <div className="panel-card"><div className="panel-hdr"><span className="panel-title">Strategy</span></div><div className="regime-state" style={{padding:15}}>{perf.strategy}%</div></div>
          <div className="panel-card"><div className="panel-hdr"><span className="panel-title">Win Rate</span></div><div className="regime-state" style={{padding:15, color:'var(--gold)'}}>{perf.win_rate}%</div></div>
          <div className="panel-card"><div className="panel-hdr"><span className="panel-title">Avg Hold</span></div><div className="regime-state" style={{padding:15, fontSize:16}}>{perf.avg_hold}</div></div>
        </div>
      )}
    </div>
  );
}

function BacktestView() {
  const [metrics, setMetrics] = useState(null);
  useEffect(() => {
    fetchJSON('/api/backtest-metrics').then(setMetrics);
  }, []);
  return (
    <div style={{padding:30}}>
      <div className="sb-label" style={{marginBottom:30}}>Institutional Backtest Analysis</div>
      {metrics ? (
        <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:24}}>
          <div className="panel-card"><div className="panel-hdr"><span className="panel-title">Average CAGR</span></div><div className="regime-state" style={{padding:20, color:'var(--acid)'}}>{metrics.cagr}%</div></div>
          <div className="panel-card"><div className="panel-hdr"><span className="panel-title">Max Drawdown</span></div><div className="regime-state" style={{padding:20, color:'var(--rose)'}}>{metrics.max_dd}%</div></div>
          <div className="panel-card"><div className="panel-hdr"><span className="panel-title">Win Rate</span></div><div className="regime-state" style={{padding:20, color:'var(--acid)'}}>{metrics.win_rate}%</div></div>
          <div className="panel-card"><div className="panel-hdr"><span className="panel-title">Sharpe Ratio</span></div><div className="regime-state" style={{padding:20}}>{metrics.sharpe}</div></div>
          <div className="panel-card"><div className="panel-hdr"><span className="panel-title">Sortino Ratio</span></div><div className="regime-state" style={{padding:20}}>{metrics.sortino}</div></div>
          <div className="panel-card"><div className="panel-hdr"><span className="panel-title">Calmar Ratio</span></div><div className="regime-state" style={{padding:20}}>{metrics.calmar}</div></div>
        </div>
      ) : <div className="empty-txt">No test results found. Execute a backtest to populate.</div>}
    </div>
  );
}

function RegimeView({data}) {
  if (!data) return <div className="empty-txt">Regime data unavailable</div>;
  return (
    <div style={{padding:30}}>
      <div className="sb-label" style={{marginBottom:30}}>Market Regime Intelligence</div>
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:30}}>
        <div className="panel-card" style={{padding:20}}>
          <div className="regime-state" style={{color:REGIME_COLORS[data.regime]}}>{data.regime}</div>
          <div className="regime-desc" style={{fontSize:12, marginTop:10}}>{data.reason || 'Current market conditions are being analyzed by the voting engine.'}</div>
          <div style={{marginTop:20}}>
            <div className="sb-stat"><span className="sb-key">VIX</span><span className="sb-val">{data.vix?.toFixed(2)}</span></div>
            <div className="sb-stat"><span className="sb-key">Threshold</span><span className="sb-val">18.00</span></div>
          </div>
        </div>
        <div className="panel-card" style={{padding:20}}>
          <div className="panel-title">Confidence Level</div>
          <div className="regime-state" style={{marginTop:10}}>High</div>
          <div className="regime-desc">Engine consensus is robust across all factors.</div>
        </div>
      </div>
    </div>
  );
}

function AlertsView() {
  const [rejections, setRejections] = useState([]);
  useEffect(() => {
    fetchJSON('/api/rejections').then(setRejections);
  }, []);
  return (
    <div style={{padding:30}}>
      <div className="sb-label" style={{marginBottom:30}}>Risk Management Rejections</div>
      <div className="table-wrap">
         <div className="thead">
          <div>Symbol</div>
          <div>Reason</div>
          <div className="r">Price</div>
          <div className="r">Time</div>
        </div>
        {rejections.map((r,i) => (
          <div key={i} className="trow" style={{borderBottom:'1px solid var(--wire)'}}>
            <div className="sym-lg" style={{color:'var(--rose)'}}>{r.symbol}</div>
            <div className="sb-key" style={{color:'var(--t1)'}}>{r.reason}</div>
            <div className="px-cell">₹{r.price}</div>
            <div className="sb-key r">{r.timestamp}</div>
          </div>
        ))}
        {rejections.length === 0 && <div className="empty-txt">No risk rejections recorded.</div>}
      </div>
    </div>
  );
}

function AllocationView() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    fetchJSON('/api/allocation/hrp')
      .then(d => { setData(d); setLoading(false); })
      .catch(() => { setData({weights:{}}); setLoading(false); });
  }, []);

  if (loading) return <div className="empty"><div className="loading-dot"/><div className="loading-dot"/><div className="loading-dot"/></div>;

  const weights = data?.weights ? Object.entries(data.weights) : [];

  return (
    <div style={{padding:30}}>
      <div className="sb-label" style={{marginBottom:30}}>Hierarchical Risk Parity (HRP) Allocation</div>
      <div className="panel-card" style={{padding:20, marginBottom:30}}>
        <div className="text-slate-400 text-[10px] mb-4">Optimal portfolio weights calculated using historical covariance and recursive bisection. Target: Maximum Diversification with Risk Parity.</div>
        <div className="h-64 w-full">
          <ResponsiveContainer>
            <BarChart data={weights.map(([s,w]) => ({symbol: s, weight: w * 100}))}>
              <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)" vertical={false} />
              <XAxis dataKey="symbol" tick={{ fill: '#64748b', fontSize: 10 }} axisLine={false} tickLine={false} />
              <YAxis tick={{ fill: '#64748b', fontSize: 10 }} axisLine={false} tickLine={false} label={{ value: 'Weight (%)', angle: -90, position: 'insideLeft', fill: '#64748b', fontSize: 10 }} />
              <Tooltip cursor={{fill: 'rgba(255,255,255,0.05)'}} contentStyle={{ backgroundColor: '#0f172a', borderColor: '#334155', borderRadius: '8px', fontSize: '12px' }} />
              <Bar dataKey="weight" fill="var(--acid)" radius={[4, 4, 0, 0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>
      <div className="table-wrap">
        <div className="thead">
          <div>Symbol</div>
          <div className="r">Optimal Weight</div>
          <div className="r">Allocation (₹10L)</div>
        </div>
        {weights.map(([s, w]) => (
          <div key={s} className="trow" style={{borderBottom:'1px solid var(--wire)'}}>
            <div className="sym-lg">{s}</div>
            <div className="sc-num r" style={{color:'var(--acid)'}}>{(w * 100).toFixed(2)}%</div>
            <div className="px-cell r">₹{(w * 1000000).toLocaleString('en-IN', {maximumFractionDigits:0})}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
lementById('root')).render(<App/>);
</script>
</html>
