[pytest]
# ── Sovereign AI Trading Engine — pytest configuration ───────────────────────

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Coverage (run via: pytest --cov=. --cov-report=term-missing)
addopts =
    --tb=short
    --strict-markers
    -q

# Custom markers
markers =
    unit:        Pure unit tests — no I/O
    integration: Tests that hit a real DB or external API
    slow:        Tests that take > 5 seconds
    scoring:     Tests for the scoring engine specifically

# Warnings
filterwarnings =
    error::DeprecationWarning
    ignore::DeprecationWarning:pkg_resources
    ignore::DeprecationWarning:google
    ignore::RuntimeWarning:modules.scoring
