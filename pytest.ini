[pytest]
# Canonical pytest configuration for this repository.
# Keep pytest behavior here rather than duplicating it in pyproject.toml.

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

asyncio_mode = auto

addopts =
    --tb=short
    --strict-markers
    -p no:doctest
    -q

markers =
    live:        Tests that call external APIs or live market sources
    unit:        Pure unit tests with no I/O
    integration: Tests that hit a real DB or service boundary
    slow:        Tests that take > 5 seconds
    scoring:     Tests for the scoring engine specifically

filterwarnings =
    error::DeprecationWarning
    ignore::DeprecationWarning:src.main
    ignore::DeprecationWarning:pkg_resources
    ignore::DeprecationWarning:google
    ignore::PendingDeprecationWarning
    ignore::UserWarning:vectorbt
    ignore::RuntimeWarning:modules.scoring
